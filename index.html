<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <meta name="theme-color" content="#07111f" />
  <title>CodePreview.live</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" crossorigin />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="bg-canvas" aria-hidden="true">
    <div class="bg-grid"></div>
    <div class="orb orb-1"></div>
    <div class="orb orb-2"></div>
    <div class="orb orb-3"></div>
  </div>

  <nav aria-label="Primary navigation">
    <a class="nav-logo" href="#" aria-label="CodePreview.live home">
      <div class="nav-logo-icon">&lt;/&gt;</div>
      <div class="nav-logo-text">Code<span>Preview</span></div>
    </a>
    <div class="nav-badge">LIVE</div>
  </nav>

  <main class="wrapper">
    <section class="editor-card" aria-label="Code editor">
      <div class="editor-topbar">
        <div class="dots" aria-hidden="true">
          <span class="dot-r"></span>
          <span class="dot-y"></span>
          <span class="dot-g"></span>
        </div>

        <div class="btn-group" aria-label="Editor actions">
          <input type="file" id="file-input" accept=".html,.htm,.css,.js,.txt" multiple />
          <button class="btn btn-upload" type="button" id="uploadBtn">
            <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Upload
          </button>

          <button class="btn btn-paste" type="button" id="pasteBtn">
            <svg viewBox="0 0 24 24" aria-hidden="true"><rect x="9" y="9" width="13" height="13" rx="2" ry="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
            Paste
          </button>

          <button class="btn btn-clear" type="button" id="clearBtn">
            <svg viewBox="0 0 24 24" aria-hidden="true"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/></svg>
            Clear
          </button>

          <button class="btn btn-run" type="button" id="runBtn">
            <svg viewBox="0 0 24 24" aria-hidden="true"><polygon points="5 3 19 12 5 21 5 3"/></svg>
            Run Preview
          </button>
        </div>
      </div>

      <div class="editor-body">
        <div class="line-nums" id="line-numbers" aria-hidden="true">
          <span>1</span>
        </div>
        <textarea
          id="main-editor"
          spellcheck="false"
          aria-label="HTML CSS JavaScript code editor"
          placeholder="<!-- Paste or upload your HTML/CSS/JS here -->
<html>
  <style>
    body { background: #0f172a; color: #f8fafc; }
  </style>
  <body>
    <h1>Hello World</h1>
    <script>
      console.log('Ready!');
    </script>
  </body>
</html>"></textarea>
      </div>

      <div class="status-bar" aria-live="polite">
        <div class="status-left">
          <div class="status-item">
            <span class="status-dot"></span>
            <span>Ready</span>
          </div>
          <span id="char-count">0 chars</span>
        </div>
        <div class="status-right">
          <span id="line-count">1 line</span>
          <span>HTML · UTF-8</span>
          <span>Tab: 4</span>
        </div>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
